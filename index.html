   HELPERS: cálculo de días sin carga
══════════════════════════════════════════ */

// Convierte "dd/mm/yyyy" → objeto Date a medianoche
function parseEsDate(str){
  if(!str)return null;
  const p=str.split("/");
  if(p.length!==3)return null;
  return new Date(+p[2],+p[1]-1,+p[0]);
}

// Formatea Date → "dd/mm/yyyy"
function fmtDate(d){
  return d.toLocaleDateString("es-ES");
}

// Dada la lista de registros, calcula:
//  - rachaSinCarga: días consecutivos sin cargar hasta hoy
//  - pctMes: % de días del mes en curso donde SÍ se cargó
//  - diasCargadosMes: número de días únicos cargados este mes
//  - diasTranscurridos: días transcurridos del mes actual (hasta hoy)
function calcChargeStats(regs, manualNoCarga){
  const hoy = new Date();
  hoy.setHours(0,0,0,0);

  // Construimos un Set de fechas donde SÍ se cargó (carga !== "none")
  const diasConCarga = new Set();
  // Y un Set de todas las fechas con registro (para saber que el día "existe")
  const diasConRegistro = new Set();

  regs.forEach(r => {
    const d = parseEsDate(r.fecha);
    if(!d) return;
    const k = fmtDate(d);
    diasConRegistro.add(k);
    if(r.carga && r.carga !== "none"){
      diasConCarga.add(k);
    }
  });

  // Añadimos manualmente días sin carga marcados (para que no cuenten como carga)
  // manualNoCarga es un array de strings "dd/mm/yyyy"
  const manualSet = new Set(manualNoCarga || []);

  // ── RACHA SIN CARGA ──
  // Recorremos hacia atrás desde hoy buscando días consecutivos sin carga
  let racha = 0;
  let cursor = new Date(hoy);
  // Máximo 365 días hacia atrás para no bucle infinito
  for(let i = 0; i < 365; i++){
    const k = fmtDate(cursor);
    const tieneCarga = diasConCarga.has(k) && !manualSet.has(k);
    if(tieneCarga){
      // Este día SÍ cargó → racha termina
      break;
    } else {
      // No cargó (o no hay registro, o marcado manual)
      racha++;
    }
    cursor.setDate(cursor.getDate() - 1);
  }
  // Restamos 1 porque el día de hoy no ha terminado
  // Solo si hoy tiene registro de carga no sumamos hoy
  const hoyK = fmtDate(hoy);
  if(diasConCarga.has(hoyK) && !manualSet.has(hoyK)){
    racha = 0;
  }

  // ── % DÍAS CARGADOS ESTE MES ──
  const anyo = hoy.getFullYear();
  const mes  = hoy.getMonth(); // 0-based
  const diaHoy = hoy.getDate();

  let diasCargadosMes = 0;
  // Recorremos cada día del mes hasta hoy
  for(let d = 1; d <= diaHoy; d++){
    const fecha = new Date(anyo, mes, d);
    const k = fmtDate(fecha);
    if(diasConCarga.has(k) && !manualSet.has(k)){
      diasCargadosMes++;
    }
  }
  const pctMes = diaHoy > 0 ? Math.round((diasCargadosMes / diaHoy) * 100) : 0;

  return { racha, pctMes, diasCargadosMes, diasTranscurridos: diaHoy };
}

/* ═══════════ BLOQUE INDICADOR DÍAS SIN CARGA ═══════════ */
function ChargingHealthBlock({regs, manualNoCarga, onAddManual, onRemoveManual, syncing}){
  const [showManual, setShowManual] = useState(false);
  const [manualDate, setManualDate] = useState(tod());

  const { racha, pctMes, diasCargadosMes, diasTranscurridos } = calcChargeStats(regs, manualNoCarga);

  // Color según racha
  const rachaColor = racha === 0 ? "#22c55e" : racha <= 2 ? "#f59e0b" : "#ef4444";
  const rachaIcon  = racha === 0 ? "✅" : racha <= 2 ? "⚠️" : "🔴";
  const rachaMsg   = racha === 0
    ? "Cargaste hoy, ¡perfecto!"
    : racha === 1
    ? "Ayer no cargaste — sin problema"
    : racha <= 3
    ? "Llevas "+racha+" días sin cargar — carga pronto"
    : "¡"+racha+" días sin cargar! Puede afectar la batería";

  // Color según % mes
  const pctColor = pctMes >= 70 ? "#22c55e" : pctMes >= 40 ? "#f59e0b" : "#ef4444";
  const pctMsg   = pctMes >= 70
    ? "Buen hábito de carga este mes"
    : pctMes >= 40
    ? "Carga con más frecuencia"
    : "Carga muy irregular este mes";

  // Mini calendario del mes: cada día del mes hasta hoy
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const anyo = hoy.getFullYear();
  const mes  = hoy.getMonth();
  const diaHoy = hoy.getDate();
  const manualSet = new Set(manualNoCarga || []);

  const diasConCarga = new Set();
  regs.forEach(r => {
    if(r.carga && r.carga !== "none"){
      diasConCarga.add(r.fecha);
    }
  });

  const calDays = [];
  for(let d = 1; d <= diaHoy; d++){
    const fecha = new Date(anyo, mes, d);
    const k = fmtDate(fecha);
    const cargo = diasConCarga.has(k) && !manualSet.has(k);
    const noCargoManual = manualSet.has(k);
    calDays.push({ d, k, cargo, noCargoManual });
  }

  return e("div",{style:{background:"#1e293b",borderRadius:"16px",padding:"18px",marginBottom:"14px"}},

    // Título
    e("div",{style:{fontWeight:"700",fontSize:"14px",marginBottom:"14px",display:"flex",alignItems:"center",gap:"8px"}},
      "🔋 Hábitos de carga — salud batería"
    ),

    // Dos métricas principales
    e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}},

      // Racha sin carga
      e("div",{style:{background:"#0f172a",borderRadius:"12px",padding:"14px",textAlign:"center",border:"1px solid #1e293b"}},
        e("div",{style:{fontSize:"11px",color:"#94a3b8",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.5px"}},"Días sin cargar"),
        e("div",{style:{fontSize:"42px",fontWeight:"800",color:rachaColor,lineHeight:"1"}},racha),
        e("div",{style:{fontSize:"10px",color:"#475569",marginTop:"2px"}},"días seguidos"),
        e("div",{style:{marginTop:"8px",fontSize:"10px",padding:"4px 6px",borderRadius:"6px",background:rachaColor+"22",color:rachaColor}},rachaIcon+" "+rachaMsg)
      ),

      // % mes
      e("div",{style:{background:"#0f172a",borderRadius:"12px",padding:"14px",textAlign:"center",border:"1px solid #1e293b"}},
        e("div",{style:{fontSize:"11px",color:"#94a3b8",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.5px"}},"Cargado este mes"),
        e("div",{style:{fontSize:"42px",fontWeight:"800",color:pctColor,lineHeight:"1"}},pctMes+"%"),
        e("div",{style:{fontSize:"10px",color:"#475569",marginTop:"2px"}},diasCargadosMes+" de "+diasTranscurridos+" días"),
        e("div",{style:{marginTop:"8px",fontSize:"10px",padding:"4px 6px",borderRadius:"6px",background:pctColor+"22",color:pctColor}},pctMsg)
      )
    ),

    // Barra de progreso % mes
    e("div",{style:{marginBottom:"14px"}},
      e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"#94a3b8",marginBottom:"4px"}},
        e("span",null,"0%"),
        e("span",null,"Meta: ≥70% días con carga"),
        e("span",null,"100%")
      ),
      e("div",{style:{background:"#0f172a",borderRadius:"8px",height:"10px",overflow:"hidden",position:"relative"}},
        e("div",{style:{position:"absolute",left:"70%",top:0,bottom:0,width:"2px",background:"#334155",zIndex:1}}),
        e("div",{style:{width:`${pctMes}%`,height:"100%",background:`linear-gradient(90deg,${pctColor}88,${pctColor})`,borderRadius:"8px",transition:"width .4s"}})
      )
    ),

    // Mini calendario del mes
    calDays.length > 0 && e("div",{style:{marginBottom:"14px"}},
      e("div",{style:{fontSize:"11px",color:"#94a3b8",marginBottom:"6px"}},"Este mes (cada cuadro = 1 día)"),
      e("div",{style:{display:"flex",flexWrap:"wrap",gap:"3px"}},
        calDays.map(({d, cargo, noCargoManual}) =>
          e("div",{
            key:d,
            title:"Día "+d+": "+(cargo?"Cargaste ✅":noCargoManual?"Sin carga (manual)":"Sin carga registrada"),
            style:{
              width:"22px",height:"22px",borderRadius:"4px",fontSize:"9px",fontWeight:"700",
              display:"flex",alignItems:"center",justifyContent:"center",
              background: cargo ? "#14532d" : noCargoManual ? "#3b1515" : "#1e2535",
              color: cargo ? "#22c55e" : noCargoManual ? "#ef4444" : "#475569",
              border: d === diaHoy ? "1px solid #60a5fa" : "1px solid transparent"
            }
          },d)
        )
      ),
      e("div",{style:{display:"flex",gap:"12px",marginTop:"6px",flexWrap:"wrap"}},
        [["#14532d","#22c55e","Día con carga"],["#1e2535","#475569","Sin registro"],["#3b1515","#ef4444","Sin carga (manual)"]].map(([bg,cl,lb])=>
          e("div",{key:lb,style:{display:"flex",alignItems:"center",gap:"4px",fontSize:"10px",color:"#94a3b8"}},
            e("div",{style:{width:"10px",height:"10px",borderRadius:"2px",background:bg,border:"1px solid "+cl}}),
            e("span",null,lb)
          )
        )
      )
    ),

    // Consejo de salud batería
    e("div",{style:{background: racha > 4 ? "#2a0a0a" : racha > 1 ? "#2a1f0a" : "#0a1f0a", border:`1px solid ${rachaColor}44`, borderRadius:"10px",padding:"10px 12px",fontSize:"12px",color:rachaColor,marginBottom:"12px",lineHeight:"1.5"}},
      e("span",{style:{fontWeight:"700"}},"💡 Consejo: "),
      racha > 4
        ? "Las baterías de ión-litio se degradan más si se dejan descargadas mucho tiempo. Intenta cargar al menos cada 2-3 días."
        : racha > 1
        ? "El e-Up! funciona mejor con cargas frecuentes a niveles medios (20%-80%). No esperes a llegar al mínimo."
        : "¡Perfecto! Mantener el hábito de carga frecuente prolonga la vida de tu batería de 16 kWh."
    ),

    // Botón marcar día sin carga manualmente
    e("div",null,
      e("button",{
        onClick:()=>setShowManual(!showManual),
        style:{background:"transparent",border:"1px solid #334155",borderRadius:"8px",color:"#94a3b8",fontSize:"12px",padding:"7px 12px",cursor:"pointer",width:"100%",textAlign:"left"}
      },(showManual?"▲ ":"▼ ")+"Marcar día sin carga manualmente"),

      showManual && e("div",{style:{marginTop:"10px",display:"flex",gap:"8px",alignItems:"center"}},
        e("input",{
          style:{...iS,flex:1,fontSize:"13px"},
          value:manualDate,
          onInput:ev=>setManualDate(ev.target.value),
          placeholder:"dd/mm/aaaa"
        }),
        e("button",{
          onClick:()=>{ if(manualDate){ onAddManual(manualDate); setManualDate(tod()); setShowManual(false); } },
          disabled:syncing,
          style:{background:"#ef4444",color:"#fff",border:"none",borderRadius:"8px",padding:"8px 14px",cursor:"pointer",fontWeight:"600",fontSize:"13px",whiteSpace:"nowrap"}
        },"Añadir")
      ),

      // Lista de días manuales
      manualNoCarga && manualNoCarga.length > 0 && e("div",{style:{marginTop:"10px"}},
        e("div",{style:{fontSize:"11px",color:"#94a3b8",marginBottom:"6px"}},"Días marcados manualmente sin carga:"),
        e("div",{style:{display:"flex",flexWrap:"wrap",gap:"5px"}},
          manualNoCarga.map(fecha =>
            e("div",{key:fecha,style:{background:"#3b1515",border:"1px solid #ef444433",borderRadius:"6px",padding:"3px 8px",fontSize:"11px",color:"#fca5a5",display:"flex",alignItems:"center",gap:"5px"}},
              e("span",null,fecha),
              e("button",{onClick:()=>onRemoveManual(fecha),style:{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:"12px",padding:"0",lineHeight:"1"}},"✕")
            )
          )
        )
      )
    )
  );
}

/* ═══════════ APP PRINCIPAL ═══════════ */
function App(){
  const [regs,setRegs]=useState([]);
  const [sohs,setSohs]=useState([]);
  const [bat,setBat]=useState(85);
  const [tab,setTab]=useState("panel");
  const [status,setStatus]=useState("loading");
  const [syncing,setSyncing]=useState(false);
  const [toast,setToast]=useState(null);
  const [dayF,setDayF]=useState({date:tod(),s:"",e:"",km:"",mode:"eco",loc:"none",season:getSeason()});
  const [editId,setEditId]=useState(null);
  const [degF,setDegF]=useState({range:"",date:tod(),notes:""});

  // Días sin carga manuales (se guardan en localStorage como fallback local)
  const [manualNoCarga,setManualNoCarga]=useState(()=>{
    try{ return JSON.parse(localStorage.getItem("manual_no_carga")||"[]"); }catch{return [];}
  });

  const addManualNoCarga = (fecha) => {
    setManualNoCarga(prev => {
      if(prev.includes(fecha)) return prev;
      const next = [...prev, fecha];
      try{ localStorage.setItem("manual_no_carga", JSON.stringify(next)); }catch{}
      return next;
    });
  };
  const removeManualNoCarga = (fecha) => {
    setManualNoCarga(prev => {
      const next = prev.filter(f => f !== fecha);
      try{ localStorage.setItem("manual_no_carga", JSON.stringify(next)); }catch{}
      return next;
    });
  };

  // Mantenimiento
  const [mants,setMants]=useState([]);
  const [mantCat,setMantCat]=useState("todas");
  const [mantF,setMantF]=useState({cat:"neumaticos",fecha:tod(),km:"",taller:"",coste:"",notas:"",prox_km:"",prox_fecha:""});
  const [mantEdit,setMantEdit]=useState(null);

  // Cargadores
  const [cargadores,setCargadores]=useState([]);
  const [cargZona,setCargZona]=useState("todas");
  const [cargEdit,setCargEdit]=useState(null);
  const [showCargForm,setShowCargForm]=useState(false);
  const [cargF,setCargF]=useState({nombre:"",direccion:"",zona:"Puzol",red:"Iberdrola",conectores:"Type 2, CCS",potencia:"22 kW",notas:"",lat:"",lng:""});

  const [aiMsgs,setAiMsgs]=useState([{r:"a",t:"Hola Paola! Soy tu asistente del VW e-up! 2014. Tus datos se guardan en Google Sheets."}]);
  const [aiIn,setAiIn]=useState("");
  const [aiLoad,setAiLoad]=useState(false);
  const chatRef=useRef(null);

  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[aiMsgs]);
  const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),3000);};

  const load=useCallback(async()=>{
    setStatus("loading");
    try{
      const d=await apiGet();
      if(!d.ok)throw new Error();
      setRegs((d.registros||[]).sort((a,b)=>b.id-a.id));
      setSohs((d.soh||[]).sort((a,b)=>b.id-a.id));
      setMants((d.mantenimiento||[]).sort((a,b)=>b.id-a.id));
      setCargadores(d.cargadores||[]);
      if(d.config?.bateria_actual)setBat(+d.config.bateria_actual);
      setStatus("ok");
    }catch{setStatus("error");}
  },[]);
  useEffect(()=>{load();},[]);

  const saveBat=async v=>{setBat(v);try{await apiPost("saveConfig",{clave:"bateria_actual",valor:String(v)});}catch{}};

  const saveDay=async()=>{
    if(!dayF.s||!dayF.e||!dayF.km){showToast("Rellena todos los campos",false);return;}
    setSyncing(true);
    const cons=((((+dayF.s-+dayF.e)/100)*BAT_KWH)/+dayF.km*100).toFixed(1);
    const payload={fecha:dayF.date,bateria_salida:+dayF.s,bateria_llegada:+dayF.e,km:+dayF.km,consumo:+cons,modo:dayF.mode,carga:dayF.loc,temporada:dayF.season};
    try{
      if(editId){await apiPost("updateRegistro",{id:editId,...payload});setRegs(r=>r.map(x=>x.id===editId?{...x,...payload,id:editId}:x));setEditId(null);showToast("Actualizado");}
      else{const res=await apiPost("saveRegistro",payload);if(!res.ok)throw new Error();setRegs(r=>[{id:res.id,...payload},...r]);showToast("Guardado en Sheets");}
      await saveBat(+dayF.e);
      setDayF({date:tod(),s:"",e:"",km:"",mode:"eco",loc:"none",season:getSeason()});
    }catch{showToast("Error al guardar",false);}
    setSyncing(false);
  };

  const delReg=async id=>{setSyncing(true);try{await apiPost("deleteRegistro",{id});setRegs(r=>r.filter(x=>x.id!==id));showToast("Eliminado");}catch{showToast("Error",false);}setSyncing(false);};
  const editReg=log=>{setDayF({date:log.fecha,s:String(log.bateria_salida),e:String(log.bateria_llegada),km:String(log.km),mode:log.modo,loc:log.carga,season:log.temporada||getSeason()});setEditId(log.id);setTab("diary");window.scrollTo(0,0);};

  const saveDeg=async()=>{
    if(!degF.range){showToast("Introduce la autonomia real",false);return;}
    setSyncing(true);
    const soh=((+degF.range/RANGE_OFF)*100).toFixed(1);
    const kwh=((+degF.range/RANGE_OFF)*BAT_KWH).toFixed(2);
    try{const res=await apiPost("saveSOH",{fecha:degF.date,autonomia_real:+degF.range,soh:+soh,kwh_usables:+kwh,notas:degF.notes});if(!res.ok)throw new Error();setSohs(s=>[{id:res.id,fecha:degF.date,autonomia_real:+degF.range,soh:+soh,kwh_usables:+kwh,notas:degF.notes},...s]);setDegF({range:"",date:tod(),notes:""});showToast("SOH guardado");}
    catch{showToast("Error",false);}
    setSyncing(false);
  };

  // Mantenimiento
  const saveMant=async()=>{
    if(!mantF.km||!mantF.fecha){showToast("Rellena fecha y km",false);return;}
    setSyncing(true);
    const cat=MANT_CATS.find(c=>c.id===mantF.cat);
    const payload={tipo:cat?.label||mantF.cat,categoria:mantF.cat,fecha:mantF.fecha,km:+mantF.km,taller:mantF.taller,coste:mantF.coste?+mantF.coste:0,notas:mantF.notas,prox_km:mantF.prox_km?+mantF.prox_km:"",prox_fecha:mantF.prox_fecha};
    try{
      if(mantEdit){await apiPost("updateMantenimiento",{id:mantEdit,...payload});setMants(m=>m.map(x=>x.id===mantEdit?{...x,...payload,id:mantEdit}:x));setMantEdit(null);showToast("Actualizado");}
      else{const res=await apiPost("saveMantenimiento",payload);if(!res.ok)throw new Error();setMants(m=>[{id:res.id,...payload},...m]);showToast("Mantenimiento guardado");}
      setMantF({cat:"neumaticos",fecha:tod(),km:"",taller:"",coste:"",notas:"",prox_km:"",prox_fecha:""});
    }catch{showToast("Error al guardar",false);}
    setSyncing(false);
  };
  const delMant=async id=>{setSyncing(true);try{await apiPost("deleteMantenimiento",{id});setMants(m=>m.filter(x=>x.id!==id));showToast("Eliminado");}catch{showToast("Error",false);}setSyncing(false);};

  // Cargadores
  const saveCarg=async()=>{
    if(!cargF.nombre||!cargF.direccion){showToast("Nombre y dirección obligatorios",false);return;}
    setSyncing(true);
    const payload={...cargF,lat:cargF.lat?+cargF.lat:"",lng:cargF.lng?+cargF.lng:"",activo:true};
    try{
      if(cargEdit){await apiPost("updateCargador",{id:cargEdit,...payload});setCargadores(c=>c.map(x=>x.id===cargEdit?{...x,...payload,id:cargEdit}:x));setCargEdit(null);showToast("Cargador actualizado");}
      else{const res=await apiPost("saveCargador",payload);if(!res.ok)throw new Error();setCargadores(c=>[{id:res.id,...payload},...c]);showToast("Cargador añadido");}
      setCargF({nombre:"",direccion:"",zona:"Puzol",red:"Iberdrola",conectores:"Type 2, CCS",potencia:"22 kW",notas:"",lat:"",lng:""});
      setShowCargForm(false);
    }catch{showToast("Error al guardar",false);}
    setSyncing(false);
  };
  const delCarg=async id=>{setSyncing(true);try{await apiPost("deleteCargador",{id});setCargadores(c=>c.filter(x=>x.id!==id));showToast("Eliminado");}catch{showToast("Error",false);}setSyncing(false);};

  const sendAI=async()=>{
    if(!aiIn.trim()||aiLoad)return;
    const msg=aiIn.trim();setAiIn("");
    const msgs=[...aiMsgs,{r:"u",t:msg}];
    setAiMsgs(msgs);setAiLoad(true);
    const ac=regs.length?(regs.reduce((s,l)=>s+(+l.consumo),0)/regs.length).toFixed(1):"15.5";
    const ld2=sohs[0];
    const {racha,pctMes}=calcChargeStats(regs,manualNoCarga);
    const sys=`Eres experto en VE y asistente del VW e-up! 2014 de Paola. DATOS: Bateria 16kWh | Autonomia 133km | SOH:${ld2?ld2.soh+"%":"no medido"} | Consumo:${ac}kWh/100km | Bateria actual:${bat}% | Registros:${regs.length} | Km:${regs.reduce((s,l)=>s+(+l.km),0)} | Dias sin cargar seguidos:${racha} | % dias cargados este mes:${pctMes}% | Uso:120km/dia L-V | Zona Puzol-Valencia. Responde en espanol, max 3 parrafos cortos.`;
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:msgs.map(m=>({role:m.r==="u"?"user":"assistant",content:m.t}))})});
      const d=await r.json();
      setAiMsgs([...msgs,{r:"a",t:d.content?.map(c=>c.text||"").join("")||"Error."}]);
    }catch{setAiMsgs([...msgs,{r:"a",t:"No se pudo conectar."}]);}
    setAiLoad(false);
  };

  const bC=gBC(bat);
  const eR=Math.round((bat/100)*112);
  const aK=((bat/100)*BAT_KWH).toFixed(1);
  const aC=regs.length?(regs.reduce((s,l)=>s+(+l.consumo),0)/regs.length).toFixed(1):"--";
  const ld=sohs[0];
  const soh=ld?ld.soh:null;
  const sC=soh>=85?"#22c55e":soh>=70?"#f59e0b":"#ef4444";
  const pC=dayF.s&&dayF.e&&dayF.km?((((+dayF.s-+dayF.e)/100)*BAT_KWH)/+dayF.km*100).toFixed(1):null;

  const TABS=[["panel","Panel"],["home","Inicio"],["diary","Diario"],["battery","Bateria"],["mant","Manten."],["map","Cargadores"],["advisor","IA"],["stats","Stats"]];

  if(status==="loading")return e("div",{style:{background:"#0f172a",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#f1f5f9"}},
    e("div",{style:{fontSize:"48px",marginBottom:"16px"}},"⚡"),
    e("div",{style:{fontWeight:"700",fontSize:"18px",marginBottom:"8px"}},"Cargando tus datos..."),
    e("div",{style:{color:"#94a3b8",fontSize:"13px"}},"Conectando con Google Sheets")
  );
  if(status==="error")return e("div",{style:{background:"#0f172a",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}},
    e("div",{style:{background:"#1e293b",borderRadius:"16px",padding:"24px",textAlign:"center",maxWidth:"360px"}},
      e("div",{style:{fontSize:"40px",marginBottom:"12px"}},"📡"),
      e("div",{style:{fontWeight:"700",fontSize:"16px",marginBottom:"8px",color:"#fca5a5"}},"Sin conexion con Sheets"),
      e("div",{style:{color:"#94a3b8",fontSize:"13px",marginBottom:"20px"}},"Comprueba tu conexion a internet."),
      e("button",{style:bP,onClick:load},"Reintentar")
    )
  );

  const card=(children,style={})=>e("div",{style:{background:"#1e293b",borderRadius:"16px",padding:"18px",marginBottom:"14px",...style}},children);
  const lbl=text=>e("label",{style:{fontSize:"12px",color:"#94a3b8",display:"block",marginBottom:"4px"}},text);
  const row=(label,value,color="#f1f5f9")=>e("div",{style:{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #334155",fontSize:"13px"}},
    e("span",{style:{color:"#94a3b8",flexShrink:0,marginRight:"8px"}},label),
    e("span",{style:{fontWeight:"600",color}},value)
  );

  return e("div",{style:{background:"#0f172a",minHeight:"100vh",color:"#f1f5f9",fontFamily:"system-ui,sans-serif",maxWidth:"480px",margin:"0 auto",paddingBottom:"70px"}},

    toast&&e("div",{style:{position:"fixed",top:"16px",left:"50%",transform:"translateX(-50%)",zIndex:9999,background:toast.ok?"#14532d":"#7f1d1d",border:`1px solid ${toast.ok?"#22c55e":"#ef4444"}`,color:"#fff",borderRadius:"10px",padding:"10px 20px",fontSize:"13px",fontWeight:"600",whiteSpace:"nowrap"}},toast.msg),

    e("div",{style:{padding:"16px 16px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}},
      e("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
        e("span",{style:{fontSize:"26px"}},"⚡"),
        e("div",null,
          e("div",{style:{fontWeight:"700",fontSize:"16px"}},"VW e-up! 2014"),
          e("div",{style:{color:"#94a3b8",fontSize:"11px"}},regs.length+" registros · "+regs.reduce((s,l)=>s+(+l.km),0)+" km"+(syncing?" · Guardando...":""))
        )
      ),
      e("div",{style:{display:"flex",gap:"8px",alignItems:"center"}},
        e("div",{style:{background:"#14532d",border:"1px solid #22c55e",borderRadius:"8px",padding:"4px 10px",fontSize:"11px",color:"#22c55e",fontWeight:"600"}},"Sheets OK"),
        e("button",{onClick:load,style:{background:"#1e293b",border:"1px solid #334155",borderRadius:"8px",padding:"4px 10px",fontSize:"11px",color:"#94a3b8",cursor:"pointer"}},"Recargar")
      )
    ),

    e("div",{style:{display:"flex",margin:"12px 16px 0",background:"#1e293b",borderRadius:"10px",padding:"3px",gap:"2px",overflowX:"auto"}},
      TABS.map(([id,lbl2])=>e("button",{key:id,onClick:()=>setTab(id),style:{flex:"0 0 auto",padding:"7px 10px",border:"none",borderRadius:"7px",cursor:"pointer",fontSize:"11px",fontWeight:"600",whiteSpace:"nowrap",background:tab===id?(id==="panel"?"#1d4ed8":"#3b82f6"):"transparent",color:tab===id?"#fff":"#94a3b8"}},lbl2))
    ),

    e("div",{style:{padding:"16px"}},

      /* ── PANEL ── */
      tab==="panel"&&e(Panel,{bat,regs,sohs}),

      /* ── INICIO ── */
      tab==="home"&&e("div",null,
        card([
          e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},
            e("span",{style:{color:"#94a3b8",fontSize:"13px"}},"Bateria actual"),
            e("span",{style:{color:bC,fontWeight:"800",fontSize:"32px"}},bat+"%")
          ),
          e("div",{style:{background:"#0f172a",borderRadius:"8px",height:"20px",overflow:"hidden",marginBottom:"12px"}},
            e("div",{style:{width:`${bat}%`,height:"100%",background:`linear-gradient(90deg,${bC}88,${bC})`,borderRadius:"8px",transition:"width .4s"}})
          ),
          e("div",{style:{display:"flex",gap:"5px",flexWrap:"wrap"}},
            [10,20,25,30,40,50,60,70,80,85,90,100].map(v=>e("button",{key:v,onClick:()=>saveBat(v),style:{padding:"4px 9px",borderRadius:"6px",border:"none",cursor:"pointer",fontSize:"12px",fontWeight:"600",background:bat===v?bC:"#334155",color:bat===v?"#fff":"#94a3b8"}},v+"%"))
          )
