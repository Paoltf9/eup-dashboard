<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>⚡ VW e-up! Dashboard</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="e-up!"/>
<link rel="manifest" href="manifest.json"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#f1f5f9;font-family:system-ui,sans-serif}
#root{max-width:480px;margin:0 auto;padding-bottom:70px}
input,button{font-family:inherit}

/* ── PANEL DE INSTRUMENTOS ── */
.panel-wrap{background:#0d0f14;border-radius:16px;padding:16px;color:#fff}
.panel-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.panel-brand{font-size:10px;letter-spacing:3px;color:#4a9eff;text-transform:uppercase;font-weight:500}
.panel-status{font-size:11px;color:#22c55e;display:flex;align-items:center;gap:5px}
.panel-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block}

/* Batería - anillo central */
.bat-ring-wrap{position:relative;width:150px;height:150px;margin:0 auto}
.bat-ring-wrap svg{width:150px;height:150px}
.bat-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-54%);text-align:center;pointer-events:none}
.bat-pct-num{font-size:34px;font-weight:600;color:#fff;line-height:1}
.bat-pct-sym{font-size:13px;color:#6b7280}
.bat-sublabel{font-size:10px;color:#6b7280;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.bat-range-pill{background:#0d1f0d;border:1px solid #22c55e44;border-radius:20px;padding:5px 14px;font-size:12px;color:#22c55e;font-weight:500;text-align:center;margin-top:8px}

/* Velocímetro */
.speedo-container{display:flex;flex-direction:column;align-items:center}
.speed-num{font-size:40px;font-weight:500;color:#fff;line-height:1;text-align:center;margin-top:4px}
.speed-unit{font-size:11px;color:#6b7280;text-align:center}

/* Cards métricas */
.metric-card{background:#161b25;border-radius:10px;padding:10px 13px;border:1px solid #1e2535}
.metric-lbl{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.metric-val{font-size:19px;font-weight:500;color:#fff;line-height:1}
.metric-unit{font-size:11px;color:#6b7280;margin-left:2px}
.rpm-bar-bg{background:#1e2535;border-radius:4px;height:5px;width:100%;overflow:hidden;margin-top:5px}
.rpm-bar-fill{height:5px;border-radius:4px;background:linear-gradient(90deg,#4a9eff,#22c55e);transition:width .4s}

/* Grid principal del panel */
.panel-main{display:grid;grid-template-columns:1fr 160px 1fr;gap:12px;align-items:center}
.panel-left,.panel-right{display:flex;flex-direction:column;gap:10px}
.panel-center{display:flex;flex-direction:column;align-items:center}

/* Alertas del panel */
.panel-alerts{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:center}
.pal{font-size:10px;padding:3px 9px;border-radius:20px}
.pal-ok{background:#0a1f0a;border:1px solid #22c55e44;color:#22c55e}
.pal-warn{background:#2a1f0a;border:1px solid #f59e0b44;color:#f59e0b}
.pal-info{background:#0a1a2a;border:1px solid #4a9eff44;color:#4a9eff}
.pal-err{background:#2a0a0a;border:1px solid #ef444444;color:#ef4444}

/* Botón actualizar velocidad */
.panel-edit-row{display:flex;gap:8px;margin-top:12px;justify-content:center}
.panel-edit-btn{background:transparent;border:1px solid #2a3347;border-radius:8px;color:#9ca3af;font-size:11px;padding:5px 12px;cursor:pointer;transition:all .15s}
.panel-edit-btn:hover{background:#1e2535;color:#fff}

/* Modal velocidad */
.pmodal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);align-items:flex-end;justify-content:center;z-index:9998;padding-bottom:80px}
.pmodal-overlay.open{display:flex}
.pmodal{background:#161b25;border:1px solid #2a3347;border-radius:16px 16px 16px 16px;padding:20px;width:100%;max-width:460px}
.pmodal h3{font-size:14px;font-weight:500;color:#fff;margin-bottom:14px}
.pmodal label{font-size:11px;color:#9ca3af;display:block;margin-bottom:3px}
.pmodal .val-row{display:flex;justify-content:space-between;font-size:12px;color:#fff;margin-bottom:12px}
.pmodal input[type=range]{width:100%}
.pmodal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.pmbtn-c{background:transparent;border:1px solid #2a3347;border-radius:8px;color:#9ca3af;padding:7px 16px;cursor:pointer;font-size:13px;font-family:inherit}
.pmbtn-s{background:#4a9eff;border:none;border-radius:8px;color:#fff;padding:7px 16px;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useCallback} = React;
const e = React.createElement;

const API = "https://script.google.com/macros/s/AKfycbxmY4q36pwRZyZM-cEAEWNTChhKcXVlLB61avSQTkrtp42MHuX7fim20SpF8FSPR4ir/exec";
const BAT = 16, RANGE = 133;
const tod = () => new Date().toLocaleDateString("es-ES");
const gBC = p => p>=60?"#22c55e":p>=30?"#f59e0b":"#ef4444";

const MODES = [
  {id:"eco",label:"ECO",color:"#22c55e"},
  {id:"normal",label:"Normal",color:"#3b82f6"},
  {id:"sport",label:"Rapido",color:"#ef4444"},
];
const CLOCS = [
  {id:"none",label:"Sin carga",color:"#475569"},
  {id:"home",label:"Casa",color:"#3b82f6"},
  {id:"work",label:"Trabajo",color:"#a78bfa"},
  {id:"public",label:"Publico",color:"#f59e0b"},
];
const SEASONS = [
  {id:"invierno",label:"Invierno",color:"#60a5fa",months:[12,1,2],rangeEst:"75-95 km"},
  {id:"primavera",label:"Primavera",color:"#34d399",months:[3,4,5],rangeEst:"100-115 km"},
  {id:"verano",label:"Verano",color:"#fbbf24",months:[6,7,8],rangeEst:"105-120 km"},
  {id:"otono",label:"Otono",color:"#f97316",months:[9,10,11],rangeEst:"95-110 km"},
];

const getSeason = () => {
  const m = new Date().getMonth()+1;
  return SEASONS.find(s=>s.months.includes(m))?.id||"primavera";
};

async function apiGet(){
  const r = await fetch(API+"?action=getAll");
  return r.json();
}
async function apiPost(action,data){
  const r = await fetch(API,{method:"POST",body:JSON.stringify({action,data})});
  return r.json();
}

const iS = {background:"#0f172a",border:"1px solid #334155",borderRadius:"8px",color:"#f1f5f9",padding:"8px 12px",width:"100%",fontSize:"14px",boxSizing:"border-box"};
const bP = {background:"#3b82f6",color:"#fff",border:"none",borderRadius:"8px",padding:"10px 16px",cursor:"pointer",fontWeight:"600",fontSize:"14px",width:"100%"};

/* ════════════════════════════════════════
   COMPONENTE: Panel de instrumentos
   Recibe todos los datos de la app padre
════════════════════════════════════════ */
function PanelInstrumentos({bat, regs, sohs}) {
  const [speed, setSpeed] = useState(0);
  const [rpm, setRpm] = useState(0);
  const [showModal, setShowModal] = useState(false);
  const [tmpSpeed, setTmpSpeed] = useState(0);
  const [tmpRpm, setTmpRpm] = useState(0);

  // Datos calculados desde los datos reales de Sheets
  const bC = gBC(bat);
  const eR = Math.round((bat/100)*112);                                                  // autonomía estimada
  const kwh = ((bat/100)*BAT).toFixed(1);                                                // kWh disponibles
  const aC = regs.length ? (regs.reduce((s,l)=>s+(+l.consumo),0)/regs.length).toFixed(1) : null;
  const ld = sohs[0];
  const soh = ld ? ld.soh : null;
  const lastReg = regs[0];
  const regenTotal = regs.length ? (regs.reduce((s,l)=>s+(+l.km * 0.012),0)).toFixed(1) : "0.0"; // estimación

  // Arco velocímetro SVG (semicírculo 160px)
  const ARC_LEN = 220;
  const arcFill = (speed / 160) * ARC_LEN;
  const arcOffset = ARC_LEN - arcFill;

  // Anillo batería
  const CIRC = 364.4;
  const batOffset = CIRC - (bat / 100) * CIRC;

  // Color batería para el anillo
  const ringColor = bat > 50 ? "#22c55e" : bat > 20 ? "#f59e0b" : "#ef4444";

  // Alertas dinámicas
  const alerts = [];
  if (bat > 55) alerts.push({cls:"pal-ok", txt:"OK para 120 km"});
  else if (bat > 20) alerts.push({cls:"pal-warn", txt:"Batería baja"});
  else alerts.push({cls:"pal-err", txt:"¡Carga urgente!"});
  if (soh) alerts.push({cls: soh>=85?"pal-ok":soh>=70?"pal-warn":"pal-err", txt:"SOH "+soh+"%"});
  if (speed > 0) alerts.push({cls:"pal-info", txt:speed+" km/h"});
  const hora = new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
  alerts.push({cls:"pal-info", txt:hora});

  const openModal = () => { setTmpSpeed(speed); setTmpRpm(rpm); setShowModal(true); };
  const saveModal = () => { setSpeed(tmpSpeed); setRpm(tmpRpm); setShowModal(false); };

  return e("div", null,
    e("div", {className:"panel-wrap"},

      // Top bar
      e("div", {className:"panel-topbar"},
        e("span", {className:"panel-brand"}, "VW e-up! · Panel"),
        e("span", {className:"panel-status"},
          e("span", {className:"panel-dot"}),
          regs.length+" registros"
        )
      ),

      // Grid principal
      e("div", {className:"panel-main"},

        // ── IZQUIERDA: velocímetro + RPM + consumo ──
        e("div", {className:"panel-left"},
          e("div", {className:"speedo-container"},
            e("svg", {width:"130", height:"80", viewBox:"0 0 160 100"},
              e("path", {d:"M 20 90 A 70 70 0 0 1 140 90", fill:"none", stroke:"#1e2535", strokeWidth:"10", strokeLinecap:"round"}),
              e("path", {d:"M 20 90 A 70 70 0 0 1 140 90", fill:"none", stroke:"#4a9eff", strokeWidth:"10", strokeLinecap:"round",
                strokeDasharray:ARC_LEN, strokeDashoffset:arcOffset, style:{transition:"stroke-dashoffset .4s"}})
            ),
            e("div", {className:"speed-num"}, speed),
            e("div", {className:"speed-unit"}, "km/h")
          ),
          e("div", {className:"metric-card"},
            e("div", {className:"metric-lbl"}, "Motor"),
            e("div", {className:"metric-val"}, rpm.toLocaleString(), e("span",{className:"metric-unit"}," rpm")),
            e("div", {className:"rpm-bar-bg"},
              e("div", {className:"rpm-bar-fill", style:{width:Math.min(rpm/12000*100,100)+"%"}})
            )
          ),
          e("div", {className:"metric-card"},
            e("div", {className:"metric-lbl"}, "Consumo medio"),
            e("div", {className:"metric-val"}, aC||"--", e("span",{className:"metric-unit"}, aC?" kWh/100":"")),
          )
        ),

        // ── CENTRO: anillo batería ──
        e("div", {className:"panel-center"},
          e("div", {className:"bat-ring-wrap"},
            e("svg", {viewBox:"0 0 140 140"},
              e("circle", {cx:"70", cy:"70", r:"58", fill:"none", stroke:"#1e2535", strokeWidth:"12"}),
              e("circle", {cx:"70", cy:"70", r:"58", fill:"none",
                stroke: ringColor, strokeWidth:"12", strokeLinecap:"round",
                strokeDasharray: CIRC, strokeDashoffset: batOffset,
                transform:"rotate(-90 70 70)",
                style:{transition:"stroke-dashoffset .5s, stroke .5s"}})
            ),
            e("div", {className:"bat-overlay"},
              e("div", {className:"bat-pct-num", style:{color: ringColor}}, bat),
              e("div", {className:"bat-pct-sym"}, "%"),
              e("div", {className:"bat-sublabel"}, "Batería")
            )
          ),
          e("div", {className:"bat-range-pill"}, "≈ "+eR+" km")
        ),

        // ── DERECHA: kWh, autonomía, regen, SOH ──
        e("div", {className:"panel-right"},
          e("div", {className:"metric-card"},
            e("div", {className:"metric-lbl"}, "kWh disponibles"),
            e("div", {className:"metric-val"}, kwh, e("span",{className:"metric-unit"}," kWh"))
          ),
          e("div", {className:"metric-card"},
            e("div", {className:"metric-lbl"}, "Autonomía"),
            e("div", {className:"metric-val"}, eR, e("span",{className:"metric-unit"}," km"))
          ),
          e("div", {className:"metric-card"},
            e("div", {className:"metric-lbl"}, "SOH batería"),
            e("div", {className:"metric-val",
              style:{color: soh ? (soh>=85?"#22c55e":soh>=70?"#f59e0b":"#ef4444") : "#475569"}},
              soh ? soh+"%" : "—"
            )
          )
        )
      ),

      // Alertas
      e("div", {className:"panel-alerts"},
        alerts.map((a,i) => e("span",{key:i, className:"pal "+a.cls}, a.txt))
      ),

      // Último registro si existe
      lastReg && e("div", {style:{marginTop:"12px",background:"#0d0f14",borderRadius:"10px",padding:"10px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
        e("span",{style:{fontSize:"11px",color:"#6b7280"}},"Último · "+lastReg.fecha),
        e("div",{style:{display:"flex",gap:"12px"}},
          [
            [lastReg.bateria_salida+"%→"+lastReg.bateria_llegada+"%","Bat","#4a9eff"],
            [lastReg.km+" km","Dist","#22c55e"],
            [lastReg.consumo+" kWh/100","Cons", lastReg.consumo>18?"#ef4444":lastReg.consumo>15?"#f59e0b":"#22c55e"]
          ].map(([v,l,c])=>e("div",{key:l,style:{textAlign:"center"}},
            e("div",{style:{fontSize:"12px",fontWeight:"600",color:c}},v),
            e("div",{style:{fontSize:"9px",color:"#6b7280"}},l)
          ))
        )
      ),

      // Botón editar marcha
      e("div", {className:"panel-edit-row"},
        e("button", {className:"panel-edit-btn", onClick: openModal}, "⚡ Actualizar velocidad / RPM"),
      )
    ),

    // Modal velocidad / RPM
    e("div", {className:"pmodal-overlay"+(showModal?" open":""), onClick: ev=>{ if(ev.target.className.includes("pmodal-overlay")) setShowModal(false); }},
      e("div", {className:"pmodal"},
        e("h3", null, "Velocidad y RPM actuales"),
        e("label", null, "Velocidad (km/h)"),
        e("div", {className:"val-row"}, e("span",null,"0"), e("span",{style:{color:"#4a9eff",fontWeight:"500"}},tmpSpeed+" km/h"), e("span",null,"160")),
        e("input", {type:"range", min:0, max:160, value:tmpSpeed, onInput: ev=>setTmpSpeed(+ev.target.value)}),
        e("div", {style:{marginTop:"12px"}}),
        e("label", null, "RPM motor"),
        e("div", {className:"val-row"}, e("span",null,"0"), e("span",{style:{color:"#4a9eff",fontWeight:"500"}},tmpRpm.toLocaleString()+" rpm"), e("span",null,"12000")),
        e("input", {type:"range", min:0, max:12000, step:100, value:tmpRpm, onInput: ev=>setTmpRpm(+ev.target.value)}),
        e("div", {className:"pmodal-btns"},
          e("button", {className:"pmbtn-c", onClick:()=>setShowModal(false)}, "Cancelar"),
          e("button", {className:"pmbtn-s", onClick:saveModal}, "Guardar")
        )
      )
    )
  );
}

/* ════════════════════════════════════════
   APP PRINCIPAL
════════════════════════════════════════ */
function App(){
  const [regs,setRegs] = useState([]);
  const [sohs,setSohs] = useState([]);
  const [bat,setBat] = useState(85);
  const [tab,setTab] = useState("panel");  // abre en Panel por defecto
  const [status,setStatus] = useState("loading");
  const [syncing,setSyncing] = useState(false);
  const [toast,setToast] = useState(null);
  const [dayF,setDayF] = useState({date:tod(),s:"",e:"",km:"",mode:"eco",loc:"none",season:getSeason()});
  const [editId,setEditId] = useState(null);
  const [degF,setDegF] = useState({range:"",date:tod(),notes:""});
  const [zone,setZone] = useState("Sueca");
  const [selSt,setSelSt] = useState(null);
  const [aiMsgs,setAiMsgs] = useState([{r:"a",t:"Hola Paola! Soy tu asistente del VW e-up! 2014. Tus datos se guardan en Google Sheets."}]);
  const [aiIn,setAiIn] = useState("");
  const [aiLoad,setAiLoad] = useState(false);
  const chatRef = useRef(null);

  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[aiMsgs]);

  const showToast = (msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),3000);};

  const load = useCallback(async()=>{
    setStatus("loading");
    try{
      const d = await apiGet();
      if(!d.ok) throw new Error();
      setRegs((d.registros||[]).sort((a,b)=>b.id-a.id));
      setSohs((d.soh||[]).sort((a,b)=>b.id-a.id));
      if(d.config?.bateria_actual) setBat(+d.config.bateria_actual);
      setStatus("ok");
    }catch{setStatus("error");}
  },[]);

  useEffect(()=>{load();},[]);

  const saveBat = async v=>{
    setBat(v);
    try{await apiPost("saveConfig",{clave:"bateria_actual",valor:String(v)});}catch{}
  };

  const saveDay = async()=>{
    if(!dayF.s||!dayF.e||!dayF.km){showToast("Rellena todos los campos",false);return;}
    setSyncing(true);
    const cons = ((((+dayF.s-+dayF.e)/100)*BAT)/+dayF.km*100).toFixed(1);
    const payload = {fecha:dayF.date,bateria_salida:+dayF.s,bateria_llegada:+dayF.e,km:+dayF.km,consumo:+cons,modo:dayF.mode,carga:dayF.loc,temporada:dayF.season};
    try{
      let res;
      if(editId){
        await apiPost("updateRegistro",{id:editId,...payload});
        setRegs(r=>r.map(x=>x.id===editId?{...x,...payload,id:editId}:x));
        setEditId(null);
        showToast("Registro actualizado");
      }else{
        res = await apiPost("saveRegistro",payload);
        if(!res.ok) throw new Error();
        setRegs(r=>[{id:res.id,...payload},...r]);
        showToast("Guardado en Google Sheets");
      }
      await saveBat(+dayF.e);
      setDayF({date:tod(),s:"",e:"",km:"",mode:"eco",loc:"none",season:getSeason()});
    }catch{showToast("Error al guardar",false);}
    setSyncing(false);
  };

  const delReg = async id=>{
    setSyncing(true);
    try{await apiPost("deleteRegistro",{id});setRegs(r=>r.filter(x=>x.id!==id));showToast("Eliminado");}
    catch{showToast("Error",false);}
    setSyncing(false);
  };

  const editReg = log=>{
    setDayF({date:log.fecha,s:String(log.bateria_salida),e:String(log.bateria_llegada),km:String(log.km),mode:log.modo,loc:log.carga,season:log.temporada||getSeason()});
    setEditId(log.id);setTab("diary");window.scrollTo(0,0);
  };

  const saveDeg = async()=>{
    if(!degF.range){showToast("Introduce la autonomia real",false);return;}
    setSyncing(true);
    const soh = ((+degF.range/RANGE)*100).toFixed(1);
    const kwh = ((+degF.range/RANGE)*BAT).toFixed(2);
    try{
      const res = await apiPost("saveSOH",{fecha:degF.date,autonomia_real:+degF.range,soh:+soh,kwh_usables:+kwh,notas:degF.notes});
      if(!res.ok) throw new Error();
      setSohs(s=>[{id:res.id,fecha:degF.date,autonomia_real:+degF.range,soh:+soh,kwh_usables:+kwh,notas:degF.notes},...s]);
      setDegF({range:"",date:tod(),notes:""});
      showToast("SOH guardado");
    }catch{showToast("Error al guardar SOH",false);}
    setSyncing(false);
  };

  const sendAI = async()=>{
    if(!aiIn.trim()||aiLoad) return;
    const msg = aiIn.trim();setAiIn("");
    const msgs = [...aiMsgs,{r:"u",t:msg}];
    setAiMsgs(msgs);setAiLoad(true);
    const ac = regs.length?(regs.reduce((s,l)=>s+(+l.consumo),0)/regs.length).toFixed(1):"15.5";
    const ld2 = sohs[0];
    const sys = `Eres experto en VE y asistente del VW e-up! 2014 de Paola. DATOS: Bateria 16kWh | Autonomia 133km | SOH:${ld2?ld2.soh+"%":"no medido"} | Consumo:${ac}kWh/100km | Bateria actual:${bat}% | Registros:${regs.length} | Km:${regs.reduce((s,l)=>s+(+l.km),0)} | Uso:120km/dia L-V | Zona Sueca-Valencia. Responde en espanol, max 3 parrafos cortos.`;
    try{
      const r = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:msgs.map(m=>({role:m.r==="u"?"user":"assistant",content:m.t}))})});
      const d = await r.json();
      setAiMsgs([...msgs,{r:"a",t:d.content?.map(c=>c.text||"").join("")||"Error."}]);
    }catch{setAiMsgs([...msgs,{r:"a",t:"No se pudo conectar."}]);}
    setAiLoad(false);
  };

  const bC = gBC(bat);
  const eR = Math.round((bat/100)*112);
  const aK = ((bat/100)*BAT).toFixed(1);
  const aC = regs.length?(regs.reduce((s,l)=>s+(+l.consumo),0)/regs.length).toFixed(1):"--";
  const ld = sohs[0];
  const soh = ld?ld.soh:null;
  const sC = soh>=85?"#22c55e":soh>=70?"#f59e0b":"#ef4444";
  const pC = dayF.s&&dayF.e&&dayF.km?((((+dayF.s-+dayF.e)/100)*BAT)/+dayF.km*100).toFixed(1):null;

  // Pestañas — Panel añadida al principio
  const TABS = [["panel","Panel"],["home","Inicio"],["diary","Diario"],["battery","Bateria"],["map","Cargadores"],["advisor","IA"],["stats","Stats"]];

        e("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"10px"}},
          ["Cuanta autonomia me queda?","Consejos para ahorrar bateria","Cuando debo recargar?","Como va mi degradacion?"].map(q=>
            e("button",{key:q,onClick:()=>setAiIn(q),style:{background:"#1e293b",border:"1px solid #334155",borderRadius:"20px",padding:"5px 10px",fontSize:"11px",color:"#93c5fd",cursor:"pointer"}},q)
          )
        ),
        e("div",{ref:chatRef,style:{flex:1,overflowY:"auto",background:"#0f172a",borderRadius:"12px",padding:"12px",marginBottom:"10px",display:"flex",flexDirection:"column",gap:"10px"}},
          aiMsgs.map((m,i)=>e("div",{key:i,style:{display:"flex",justifyContent:m.r==="u"?"flex-end":"flex-start"}},
            e("div",{style:{maxWidth:"85%",padding:"10px 14px",borderRadius:m.r==="u"?"16px 16px 4px 16px":"16px 16px 16px 4px",background:m.r==="u"?"#3b82f6":"#1e293b",fontSize:"13px",lineHeight:"1.6"}},m.t)
          )),
          aiLoad && e("div",{style:{display:"flex"}},e("div",{style:{background:"#1e293b",padding:"10px 14px",borderRadius:"16px 16px 16px 4px",fontSize:"13px",color:"#94a3b8"}},"Analizando..."))
        ),
        e("div",{style:{display:"flex",gap:"8px"}},
          e("input",{style:{...iS,flex:"1"},placeholder:"Pregunta sobre tu vehiculo...",value:aiIn,onInput:ev=>setAiIn(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&sendAI()}),
          e("button",{onClick:sendAI,disabled:aiLoad,style:{background:aiLoad?"#334155":"#3b82f6",border:"none",borderRadius:"8px",padding:"0 16px",cursor:aiLoad?"not-allowed":"pointer",fontSize:"18px",color:"#fff"}},"→")
        )
      ),

      /* ══════════════════════════════
         PESTAÑA: STATS
      ══════════════════════════════ */
      tab==="stats" && e("div",null,
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}},
          [["Registros",regs.length,"#3b82f6"],["Km totales",regs.reduce((s,l)=>s+(+l.km),0)+" km","#22c55e"],["En ECO",regs.filter(l=>l.modo==="eco").length,"#22c55e"],["SOH",soh?soh+"%":"--",soh?sC:"#475569"]].map(([l,v,c])=>
            e("div",{key:l,style:{background:"#1e293b",borderRadius:"14px",padding:"14px",textAlign:"center"}},
              e("div",{style:{color:"#94a3b8",fontSize:"11px",marginBottom:"4px"}},l),
              e("div",{style:{fontSize:"20px",fontWeight:"700",color:c}},v)
            )
          )
        ),
        regs.length>0 && card([
          e("div",{style:{fontWeight:"700",marginBottom:"12px"}},"Consumo por registro"),
          regs.slice(0,10).map(log=>{
            const c=log.consumo>18?"#ef4444":log.consumo>15?"#f59e0b":"#22c55e";
            return e("div",{key:log.id,style:{marginBottom:"8px"}},
              e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"12px",marginBottom:"3px"}},
                e("span",{style:{color:"#94a3b8"}},log.fecha+" · "+log.km+" km"),
                e("span",{style:{color:c,fontWeight:"700"}},log.consumo+" kWh/100")
              ),
              e("div",{style:{background:"#0f172a",borderRadius:"4px",height:"6px"}},
                e("div",{style:{width:`${Math.min(log.consumo/25*100,100)}%`,height:"100%",borderRadius:"4px",background:c}})
              )
            );
          })
        ]),
        card([
          e("div",{style:{fontWeight:"700",marginBottom:"12px"}},"Modos de conduccion"),
          MODES.map(m=>{
            const cnt=regs.filter(l=>l.modo===m.id).length;
            const pct=regs.length?Math.round(cnt/regs.length*100):0;
            return e("div",{key:m.id,style:{marginBottom:"10px"}},
              e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px",marginBottom:"3px"}},
                e("span",{style:{color:m.color,fontWeight:"600"}},m.label),
                e("span",{style:{color:"#94a3b8"}},cnt+" registros ("+pct+"%)")
              ),
              e("div",{style:{background:"#0f172a",borderRadius:"4px",height:"8px"}},
                e("div",{style:{width:`${pct}%`,height:"100%",borderRadius:"4px",background:m.color}})
              )
            );
          })
        ])
      )
    ),

    e("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:"#0f172a",borderTop:"1px solid #1e293b",padding:"8px 0",textAlign:"center"}},
      e("span",{style:{fontSize:"11px",color:"#475569"}},"VW e-up! · Datos en Google Sheets")
    )
  );
}

ReactDOM.render(React.createElement(App,null), document.getElementById("root"));
</script>
</body>
</html>
